<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的履歷</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <!-- 照片 -->
        <div class="photo">
            <img src="IMG_7676.jpeg" alt="我的照片">
        </div>

        <!-- 個人資料 -->
        <div class="personal-info">
            <h1>Phoebe Liu</h1>
            <p>學號: AU114018061</p>
            <p>Email: example@email.com</p>
            <p>電話: 09xx-xxx-xxx</p>

        <!-- 自我介紹 -->
        <div class="section">
            <h2>自我介紹</h2>
            <p>我是熱愛前端開發的學生，喜歡將創意和程式結合，打造簡潔、美觀的網站。</p>
        </div>

        <div class="section">
            <h2>技能</h2>
            <ul>
                <li>HTML / CSS / JavaScript</li>
                <li>Git / GitHub</li>
                <li>React 基礎</li>
            </ul>

        <!-- 經歷 -->

            <h2>經歷</h2>

                <li>2025 - 前端實習生，ABC 公司</li>
                <li>2024 - 校園專案開發小組</li>
            </ul>
        </div>

        <!-- 按鈕示範 JS -->
        <div class="section">
            <button id="showMoreBtn">顯示更多</button>
            <div id="moreInfo" class="hidden">
                <p>這裡可以放更多詳細資訊，例如作品集、證照或獎項。</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
